name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  quality-gates:
    uses: ./.github/workflows/quality-gates.yml

  build-release:
    needs: quality-gates
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Read release version
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "VERSION file is required for release builds" >&2
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release bundle
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          bundle_dir="release-bundle"
          mkdir -p "$bundle_dir"

          LDFLAGS="-s -w -X main.Version=${VERSION}"

          build() {
            os="$1"
            arch="$2"
            output="$3"

            echo "Building ${output} for ${os}/${arch}..."
            GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="${LDFLAGS}" -o "${bundle_dir}/${output}" ./cmd/md2wechat
            echo "✓ ${output}"
          }

          build linux amd64 md2wechat-linux-amd64
          build linux arm64 md2wechat-linux-arm64
          build darwin amd64 md2wechat-darwin-amd64
          build darwin arm64 md2wechat-darwin-arm64
          build windows amd64 md2wechat-windows-amd64.exe

          {
            printf 'export MD2WECHAT_VERSION_DEFAULT=%q\n' "${VERSION}"
            cat scripts/install.sh
          } > "${bundle_dir}/install.sh"
          {
            printf '$env:MD2WECHAT_VERSION_DEFAULT = "%s"\n' "${VERSION}"
            cat scripts/install.ps1
          } > "${bundle_dir}/install.ps1"
          {
            printf 'export MD2WECHAT_VERSION_DEFAULT=%q\n' "${VERSION}"
            cat scripts/install-openclaw.sh
          } > "${bundle_dir}/install-openclaw.sh"
          mkdir -p "${bundle_dir}/openclaw-skill/skills/md2wechat"
          cp -r platforms/openclaw/md2wechat/. "${bundle_dir}/openclaw-skill/skills/md2wechat/"
          tar -czf "${bundle_dir}/md2wechat-openclaw-skill.tar.gz" -C "${bundle_dir}/openclaw-skill" skills/md2wechat
          rm -rf "${bundle_dir}/openclaw-skill"
          chmod +x "${bundle_dir}/install.sh" "${bundle_dir}/md2wechat-linux-amd64" "${bundle_dir}/md2wechat-linux-arm64" "${bundle_dir}/md2wechat-darwin-amd64" "${bundle_dir}/md2wechat-darwin-arm64" 2>/dev/null || true

          (
            cd "$bundle_dir"
            sha256sum * | tee checksums.txt
          )

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: md2wechat-release-${{ steps.version.outputs.value }}
          path: release-bundle
          if-no-files-found: error
          retention-days: 1

  smoke-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: md2wechat-release-${{ needs.build-release.outputs.version }}
          path: release-artifact

      - name: Smoke release binary
        env:
          VERSION: ${{ needs.build-release.outputs.version }}
        run: |
          bundle_dir="${GITHUB_WORKSPACE}/release-artifact"
          binary="${bundle_dir}/md2wechat-linux-amd64"

          chmod +x "$binary"
          output="$("$binary" version --json)"
          printf '%s\n' "$output"
          echo "$output" | grep -q "\"version\": \"${VERSION}\""

      - name: Smoke shell installer against same artifact
        env:
          VERSION: ${{ needs.build-release.outputs.version }}
        run: |
          bundle_dir="${GITHUB_WORKSPACE}/release-artifact"
          install_dir="$(mktemp -d)"

          MD2WECHAT_VERSION="$VERSION" \
          MD2WECHAT_RELEASE_BASE_URL="file://${bundle_dir}" \
          MD2WECHAT_INSTALL_DIR="$install_dir" \
          bash "${bundle_dir}/install.sh"

          "${install_dir}/md2wechat" version --json | grep -q "\"version\": \"${VERSION}\""

      - name: Smoke OpenClaw installer against same artifact
        env:
          VERSION: ${{ needs.build-release.outputs.version }}
        run: |
          bundle_dir="${GITHUB_WORKSPACE}/release-artifact"
          home_dir="$(mktemp -d)"

          mkdir -p "${home_dir}/.openclaw"

          HOME="${home_dir}" \
          MD2WECHAT_VERSION="$VERSION" \
          MD2WECHAT_RELEASE_BASE_URL="file://${bundle_dir}" \
          MD2WECHAT_NONINTERACTIVE=1 \
          bash "${bundle_dir}/install-openclaw.sh"

          test -f "${home_dir}/.openclaw/skills/md2wechat/SKILL.md"
          test -x "${home_dir}/.openclaw/skills/md2wechat/scripts/run.sh"
          test -x "${home_dir}/.openclaw/tools/md2wechat/md2wechat"
          HOME="${home_dir}" "${home_dir}/.openclaw/skills/md2wechat/scripts/run.sh" version --json | grep -q "\"version\": \"${VERSION}\""

  smoke-release-windows:
    needs: build-release
    runs-on: windows-latest
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: md2wechat-release-${{ needs.build-release.outputs.version }}
          path: release-artifact

      - name: Smoke PowerShell installer against same artifact
        env:
          VERSION: ${{ needs.build-release.outputs.version }}
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE 'release-artifact'
          $installDir = Join-Path $env:RUNNER_TEMP 'md2wechat-install-ps1'

          $env:MD2WECHAT_VERSION = $env:VERSION
          $env:MD2WECHAT_RELEASE_BASE_URL = "file://$bundleDir"
          $env:MD2WECHAT_INSTALL_DIR = $installDir
          $env:MD2WECHAT_NONINTERACTIVE = '1'
          $env:MD2WECHAT_NO_PATH_UPDATE = '1'

          & (Join-Path $bundleDir 'install.ps1')

          $versionOutput = & (Join-Path $installDir 'md2wechat.exe') version --json | Out-String
          $versionOutput
          $versionData = $versionOutput | ConvertFrom-Json
          if ($versionData.data.version -ne $env:VERSION) {
            throw "installed PowerShell binary version mismatch"
          }

  release:
    needs:
      - build-release
      - smoke-release
      - smoke-release-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: md2wechat-release-${{ needs.build-release.outputs.version }}
          path: release-artifact

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-release.outputs.version }}
          name: v${{ needs.build-release.outputs.version }}
          files: |
            release-artifact/md2wechat-linux-amd64
            release-artifact/md2wechat-linux-arm64
            release-artifact/md2wechat-darwin-amd64
            release-artifact/md2wechat-darwin-arm64
            release-artifact/md2wechat-windows-amd64.exe
            release-artifact/install.sh
            release-artifact/install.ps1
            release-artifact/install-openclaw.sh
            release-artifact/md2wechat-openclaw-skill.tar.gz
            release-artifact/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
