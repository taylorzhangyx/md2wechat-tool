schema_version: "1"
name: checklist
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [readability, conversion]
content_types: [tutorial, report]
industry: [general]
tags: [conversion, checklist, todo, verification, review]
position: body
when_to_use: |
  发布前检查、执行清单、收藏型内容。
  适合操作规范、上线核对、行动步骤验证。
when_not_to_use: |
  纯步骤说明用 steps；
  FAQ 和疑问解答用 faq。
pairs_well_with: [steps, specs, notice]
avoid_combining_with: []
anti_pattern: |
  没有任何有效事项导致渲染失败；
  状态列写错（只允许 done/pending/warn/todo）；
  每条都写 done 失去检查列表的意义。
rows:
  delimiter: "|"
  min_columns: 1
  schema:
    - name: status
      description: "状态：done（完成）/ pending（待完成）/ warn（警告）/ todo（等同 pending）"
      enum: [done, pending, warn, todo]
    - name: item
      description: 检查事项
    - name: note
      description: 说明，补充检查要点（可省略）
example: |
  :::checklist[发布前检查]
  done | 结构先搭好 | 先把目录、重点和结论摆出来
  pending | 数据再补齐 | 关键数字和案例放进对应模块
  warn | 链接和说明单独检查 | 避免手机里出现跳读和看不清
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#checklist"
