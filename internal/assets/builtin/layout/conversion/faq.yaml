schema_version: "1"
name: faq
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [conversion, readability]
content_types: [tutorial, announcement, product-launch]
industry: [general]
tags: [conversion, faq, questions, objections, support]
position: body
when_to_use: |
  常见疑问、风险解释、购买顾虑处理。
  适合产品发布、方案提案、教程补充说明。
when_not_to_use: |
  只有 1-2 个问题时直接写正文；
  问答互动型内容用 question（sprint4）。
pairs_well_with: [pricing, notice, cta]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 2 列的行导致渲染失败；
  问题列写成陈述句而非疑问句；
  回答写太长应该拆成正文段落。
rows:
  delimiter: "|"
  min_columns: 2
  schema:
    - name: question
      description: 常见问题，以问句形式表达
    - name: answer
      description: 简洁回答，直接解决疑虑
example: |
  :::faq[常见问题]
  这些模块只能在某一个主题里用吗？ | 不是，所有主题都会生效。
  为什么不用硬双列？ | 因为微信正文窄，单列模块更稳。
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#faq"
