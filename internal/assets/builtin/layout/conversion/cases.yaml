schema_version: "1"
name: cases
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [conversion, attention]
content_types: [report, announcement, brand, product-launch]
industry: [general]
tags: [conversion, cases, results, testimonial, social-proof]
position: body
when_to_use: |
  案例、成果、客户场景展示。
  适合产品价值说明、方案效果展示、用户成功案例。
when_not_to_use: |
  团队成员介绍用 people；
  定价方案用 pricing 模块。
pairs_well_with: [metrics, pricing, verdict]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 3 列的行导致渲染失败；
  结果列写模糊定性而非具体数字；
  每行都用 accent 失去重点效果。
rows:
  delimiter: "|"
  min_columns: 3
  schema:
    - name: title
      description: 案例标题或客户名称
    - name: result
      description: 案例结果，尽量用数字表达
    - name: context
      description: 说明，解释如何达成这个结果
    - name: style
      description: "风格：accent 或 default（可省略）"
      enum: [accent, default]
example: |
  :::cases[案例精选]
  品牌发布稿 | 阅读完成率 +38% | 用封面卡和数据卡更容易把重点讲清楚 | accent
  销售方案稿 | 理解效率更高 | 用对比卡和步骤流减少解释成本 | default
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#cases"
