schema_version: "1"
name: logos
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [conversion, memorability]
content_types: [announcement, brand, product-launch]
industry: [general]
tags: [conversion, logos, brands, partners, clients]
position: body
when_to_use: |
  品牌墙、客户墙、合作方展示。
  适合建立信任感、展示合作背书。
when_not_to_use: |
  有具体结果数据时用 cases；
  团队成员介绍用 people。
pairs_well_with: [cases, pricing, verdict]
avoid_combining_with: []
anti_pattern: |
  没有任何非空行导致渲染失败；
  品牌名写太长影响排版；
  说明列写成宣传语而非简洁定位。
rows:
  delimiter: "|"
  min_columns: 1
  schema:
    - name: name
      description: 品牌或合作方名称
    - name: description
      description: 简短定位说明（可省略）
example: |
  :::logos[合作品牌]
  Northstar | 增长团队
  MoriLab | 内容品牌
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#logos"
