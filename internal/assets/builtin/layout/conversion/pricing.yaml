schema_version: "1"
name: pricing
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [conversion]
content_types: [announcement, product-launch, brand]
industry: [general]
tags: [conversion, pricing, plans, packages, tiers]
position: body
when_to_use: |
  方案报价、套餐差异、版本选择。
  适合产品发布、方案提案、服务对比。
when_not_to_use: |
  案例展示用 cases；参数说明用 specs；
  纯功能对比不涉及价格时用 compare。
pairs_well_with: [cases, faq, cta]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 3 列的行导致渲染失败；
  功能列用逗号分隔（应用 / 分隔，会自动拆成列表）；
  价格列格式不统一（应统一使用货币符号）。
rows:
  delimiter: "|"
  min_columns: 3
  schema:
    - name: plan
      description: 方案名称（如"轻量版"、"专业版"）
    - name: price
      description: 价格（如"￥199"、"免费"）
    - name: features
      description: 功能列表，用 / 分隔（自动渲染为列表）
    - name: style
      description: "风格：accent 或 default（可省略）"
      enum: [accent, default]
example: |
  :::pricing[方案组合]
  轻量版 | ￥199 | 主题排版 / 基础模块 / 日常内容 | default
  专业版 | ￥599 | 高级模块 / 商业稿结构 / 更强展示力 | accent
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#pricing"
