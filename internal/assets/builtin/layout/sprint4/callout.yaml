schema_version: "1"
name: callout
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [attention, readability]
content_types: [tutorial, report, announcement]
industry: [general]
tags: [sprint4, callout, tip, warning, alert, info]
position: body
when_to_use: |
  重要提示、警告、成功确认、危险操作说明。
  适合在正文中插入需要读者特别注意的信息。
when_not_to_use: |
  多条注意事项用 notice；
  文章前提说明用 notice 或 audience-fit。
pairs_well_with: [notice, steps, checklist]
avoid_combining_with: []
anti_pattern: |
  缺少 content 导致渲染失败；
  danger 类型用于非危险场景失去警示意义；
  内容写太长应该拆成正文段落。
rows:
  columns:
    - name: content
      description: 提示内容（纯文本或 Markdown 行内语法）
  min_cols: 1
example: |
  :::callout warning
  这是一条警告提示，请在操作前确认已备份数据。
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#callout"
