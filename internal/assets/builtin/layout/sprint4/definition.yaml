schema_version: "1"
name: definition
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [readability]
content_types: [tutorial, report]
industry: [general]
tags: [sprint4, definition, term, glossary, concept]
position: body
when_to_use: |
  专业术语解释、概念定义、行业词汇说明。
  适合在正文中嵌入术语卡片，避免读者需要查阅。
when_not_to_use: |
  多个术语批量解释用列表或 specs；
  FAQ 答疑用 faq 模块。
pairs_well_with: [callout, specs, steps]
avoid_combining_with: []
anti_pattern: |
  缺少 term 或 definition 导致渲染失败；
  definition 写太长失去术语卡片的简洁性；
  term 写成句子而非简短词汇。

example: |
  :::definition
  {"term":"OKR","def":"目标与关键结果","termLabel":"术语"}
  :::
