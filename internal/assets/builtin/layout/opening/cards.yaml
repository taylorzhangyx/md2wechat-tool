schema_version: "1"
name: cards
version: "1.0.0"
since: "1.5.0"
category: opening
serves: [attention, readability]
content_types: [opinion, tutorial, report, announcement]
industry: [general]
tags: [opening, cards, overview, structure]
position: opening
when_to_use: |
  开头快速列出文章结构、重点、分工或模块速览。
  适合长文章导引、多角度分析、专题系列索引。
when_not_to_use: |
  内容只有 1-2 个点时不需要卡片列表；
  纯数据报告用 metrics；流程说明用 steps。
pairs_well_with: [hero, toc, part]
avoid_combining_with: [cards]
anti_pattern: |
  每行少于 3 列导致渲染失败；
  风格字段写错（只允许 accent 或 default）；
  把所有内容塞进一张卡片而不是分开。
rows:
  delimiter: "|"
  min_columns: 3
  schema:
    - name: label
      description: 卡片标签（如 PART 01、模块名）
    - name: title
      description: 卡片标题，简短有力
    - name: description
      description: 卡片说明，一句话描述内容
    - name: style
      description: "风格：accent 或 default（可省略，默认 default）"
      enum: [accent, default]
example: |
  :::cards[模块速览]
  PART 01 | 开场模块 | 先交代判断和阅读入口 | accent
  PART 02 | 信息图模块 | 先把一句判断放大成视觉摘要 | default
  PART 03 | 证据模块 | 用数据、对比和步骤支撑结论 | default
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#cards"
