schema_version: "1"
name: image-text
version: "1.0.0"
since: "1.5.0"
category: evidence
serves: [readability]
content_types: [tutorial, report, announcement]
industry: [general]
tags: [evidence, image, image-text, layout, figure]
position: body
when_to_use: |
  把图片和解释放在同一个阅读区。
  适合教程拆解、产品介绍和案例说明。
when_not_to_use: |
  多张图片对比用 image-compare；
  图片标注用 image-annotate；
  带步骤的图片说明用 image-steps。
pairs_well_with: [steps, compare, image-compare]
avoid_combining_with: []
anti_pattern: |
  缺少 image 或同时缺少 title 和 body 导致渲染失败；
  图片 URL 无效或不可访问；
  body 写太长导致图文比例失调。
fields:
  required:
    - name: image
      description: 图片 URL（必填）
      example: "https://example.com/split.png"
  optional:
    - name: title
      description: 图文标题（title 或 body 至少填一个）
      example: "图和说明绑在一起，读者更容易跟上重点"
    - name: body
      description: 图文说明正文（title 或 body 至少填一个）
      example: "左边先讲结论，右边再放真实界面，减少来回对照的成本。"
    - name: layout
      description: "布局：right 表示文字在前图片在后，其他值默认图片在前"
      example: "right"
    - name: eyebrow
      description: 标签词
      example: "功能截图"
    - name: note
      description: 底部说明
      example: "适合教程拆解、产品介绍和案例说明"
    - name: alt
      description: 图片替代文字，提升可访问性
      example: "图文双栏示例图片"
example: |
  :::image-text
  layout: right
  eyebrow: 功能截图
  title: 图和说明绑在一起，读者更容易跟上重点
  body: 左边先讲结论，右边再放真实界面，减少来回对照的成本。
  note: 适合教程拆解、产品介绍和案例说明
  image: https://example.com/split.png
  alt: 图文双栏示例图片
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#image-text"
