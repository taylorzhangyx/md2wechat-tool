schema_version: "1"
name: quote
version: "1.0.0"
since: "1.5.0"
category: evidence
serves: [attention, memorability]
content_types: [opinion, tutorial, report, announcement]
industry: [general]
tags: [evidence, quote, pullquote, citation]
position: body
when_to_use: |
  金句、引文、观点强调。
  适合访谈摘录、作者核心观点、有说服力的引用。
when_not_to_use: |
  需要大段引用时直接用 blockquote；
  封面金句用 quote-card（sprint4）。
pairs_well_with: [verdict, infographic, bridge]
avoid_combining_with: []
anti_pattern: |
  quote 和 text 都没有导致渲染失败；
  引用内容太长超过 3 句话；
  source 写成空字符串导致显示问题。
fields:
  required: []
  optional:
    - name: quote
      description: 引用正文（quote 或 text 至少填一个）
      example: "模块不是为了让页面更满，而是为了让读者更快找到判断、证据和下一步。"
    - name: text
      description: 引用正文别名（quote 或 text 至少填一个）
      example: "模块不是为了让页面更满，而是为了让读者更快找到判断、证据和下一步。"
    - name: eyebrow
      description: 标签词，定位引用的角色
      example: "核心观点"
    - name: source
      description: 来源说明（作者名或文章名）
      example: "内容设计原则"
    - name: note
      description: 底部说明
      example: "适合金句、访谈摘录、文章结论"
    - name: tone
      description: "样式：accent 使用强调样式，默认为普通样式"
      enum: [accent, default]
      example: "accent"
example: |
  :::quote
  eyebrow: 核心观点
  quote: 模块不是为了让页面更满，而是为了让读者更快找到判断、证据和下一步。
  source: 内容设计原则
  note: 适合金句、访谈摘录、文章结论
  tone: accent
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#quote"
