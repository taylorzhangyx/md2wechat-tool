schema_version: "1"
name: image-compare
version: "1.0.0"
since: "1.5.0"
category: evidence
serves: [attention, readability]
content_types: [tutorial, report, announcement, product-launch]
industry: [general]
tags: [evidence, image, before-after, compare, ab-test]
position: body
when_to_use: |
  前后对比图、A/B 方案图、改版对比。
  当视觉变化比文字描述更直观时使用。
when_not_to_use: |
  纯文字对比用 compare；单张图片说明用 image-text；
  图片标注用 image-annotate。
pairs_well_with: [compare, verdict, steps]
avoid_combining_with: []
anti_pattern: |
  缺少 left_image 或 right_image 导致渲染失败；
  两张图片尺寸差异过大影响对比效果；
  title 写成描述而非对比结论。
fields:
  required:
    - name: left_image
      description: 左侧图片 URL（必填）
      example: "https://example.com/before.png"
    - name: right_image
      description: 右侧图片 URL（必填）
      example: "https://example.com/after.png"
  optional:
    - name: eyebrow
      description: 标签词
      example: "前后对比"
    - name: title
      description: 对比标题，说明对比的核心结论
      example: "左右并排时，变化会比大段解释更直接"
    - name: left_title
      description: 左侧图片标题
      example: "改版前"
    - name: right_title
      description: 右侧图片标题
      example: "改版后"
    - name: left_alt
      description: 左侧图片替代文字
      example: "改版前截图"
    - name: right_alt
      description: 右侧图片替代文字
      example: "改版后截图"
    - name: note
      description: 底部说明
      example: "适合界面改版、海报优化和方案 A/B 对比"
example: |
  :::image-compare
  eyebrow: 前后对比
  title: 左右并排时，变化会比大段解释更直接
  left_title: 改版前
  left_image: https://example.com/before.png
  right_title: 改版后
  right_image: https://example.com/after.png
  note: 适合界面改版、海报优化和方案 A/B 对比
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#image-compare"
