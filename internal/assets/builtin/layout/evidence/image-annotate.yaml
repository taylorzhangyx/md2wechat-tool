schema_version: "1"
name: image-annotate
version: "1.0.0"
since: "1.5.0"
category: evidence
serves: [readability, attention]
content_types: [tutorial, report]
industry: [general]
tags: [evidence, image, annotation, callout, highlight]
position: body
when_to_use: |
  图片重点标注，适合后台截图、页面结构、海报拆解。
  当需要引导读者注意图片特定区域时使用。
when_not_to_use: |
  没有需要标注的重点时直接用 image-text；
  步骤图示用 image-steps。
pairs_well_with: [image-text, steps, image-steps]
avoid_combining_with: []
anti_pattern: |
  缺少 image 或没有任何有效 point 导致渲染失败；
  point 坐标超过 100 或写成百分号格式（应写纯数字）；
  标注点太多（超过 5 个）导致图片拥挤。
fields:
  required:
    - name: image
      description: 图片 URL（必填）
      example: "https://example.com/annotate.png"
  optional:
    - name: eyebrow
      description: 标签词
      example: "拆解说明"
    - name: title
      description: 标注图标题
      example: "图片标注卡适合直接告诉读者重点该看哪里"
    - name: note
      description: 底部说明
      example: "适合后台截图、海报拆解、页面结构分析"
    - name: alt
      description: 图片替代文字
      example: "图片标注卡示例"
example: |
  :::image-annotate
  eyebrow: 拆解说明
  title: 图片标注卡适合直接告诉读者重点该看哪里
  note: 适合后台截图、海报拆解、页面结构分析
  image: https://example.com/annotate.png
  alt: 图片标注卡示例
  point: 01 | 24 | 24 | 主信息区 | 一进入页面先看到的核心判断和主标题
  point: 02 | 74 | 36 | 指标区 | 适合讲关键数字、结果和变化
  point: 03 | 56 | 76 | 行动区 | 适合解释按钮、入口和下一步动作
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#image-annotate"
