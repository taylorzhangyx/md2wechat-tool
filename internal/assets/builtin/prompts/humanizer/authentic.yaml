name: authentic
kind: humanizer
description: 真实写作模式 — 以六维具体规则引导输出像真人写的中文
version: "1.0"
variables:
  - CONTENT
template: |
  # 真实写作重写

  请用自然、克制、像真人的中文重写以下文本。目标不是"去除 AI 痕迹"，而是写得像一个真正会写字的人：表达具体，语气稳，不装深刻，不刻意煽动，不堆砌修辞。

  请严格遵守以下六个维度的规则：

  ## 一、用词

  1. 优先使用简洁、直接、常见的中文表达，不要为了显得高级而刻意书面化、抽象化、宏大化。
  2. 少用空泛大词、万能词、正确但无信息量的词，例如：
     "深刻""本质上""某种意义上""值得注意的是""不难发现""显而易见""重要的是""归根结底""从某种程度上说""具有重要意义""带来了深远影响"等。
  3. 能说"是"就说"是"，不要总写成"意味着""标志着""体现了""成为了""构成了""扮演了……角色"之类的替代句式。
  4. 避免堆叠抽象名词：逻辑、路径、机制、维度、格局、图景、生态、范式、体系、叙事、赋能、协同、闭环。只有确实必要时才使用。

  ## 二、句式

  1. 避免明显的 AI 套路句：
     - "不是……而是……"
     - "不是A，不是B，而是C"
     - "问题不在于……而在于……"
     - "真正的问题是……"
     - "最关键的是……"
     - "答案很简单……"
  2. 不要连续用同一种句式开头，比如连续多句都用"它会……""它可以……""我们需要……""这不仅……也……"。
  3. 少用过度整齐的排比、三连、四连、五连。偶尔可以用，连续出现会很像 AI。
  4. 少用"为了增强气势"而拆碎的短句。不要把一句完整的话故意切成三四句来制造力度。
  5. 避免句尾硬加空洞总结："这也凸显了其重要性""进一步说明了这一趋势""反映了更深层次的变化"。除非后面真的解释"重要性是什么""趋势是什么""变化是什么"。

  ## 三、语气

  1. 不要故作深刻、故作犀利、故作启发。
  2. 不要频繁使用"其实""说白了""某种意义上""更重要的是""真正值得关注的是"来制造一种"我要揭示本质"的感觉。
  3. 不要强行制造悬念或戏剧性："关键来了""问题就在这里""但事情没那么简单""更有意思的是""真正可怕的地方在于"。
  4. 不要用居高临下、教师讲解式口吻：少说"我们不妨这样理解""你可以把它想象成……""让我们拆开来看""下面我们来具体分析"。
  5. 不要假装真诚、假装坦率："说实话""坦白讲""老实说"。除非上下文真的需要这种语气。

  ## 四、内容表达

  1. 优先具体，不要空泛。少讲"趋势""影响""变革""价值"，多讲具体对象、具体动作、具体原因、具体结果。
  2. 不要用模糊归因来撑场面："有人认为""业内普遍认为""专家指出""不少研究表明"。除非能明确说明是谁、哪类人、哪项研究。
  3. 不要生造看似专业的新概念来代替论证。如果提出一个概念，必须清楚、必要，且后文真正解释它。
  4. 不要把普通观点拔高成宏大命题："时代转折""底层重构""重新定义一切""具有划时代意义"。

  ## 五、结构

  1. 不要反复总结前文，不要每一段都像在做小结。
  2. 不要为了"完整"而重复同一个观点，只是换一种说法再讲一遍。
  3. 不要为了显得丰富而硬塞类比、比喻、历史案例、公司案例。一个例子够用，就不要再堆三个相似例子。
  4. 不要全文反复使用同一个比喻或同一套意象。
  5. 结尾不要机械地写"总之""综上所述""总而言之""最后可以看出"。让文章自然收束即可。

  ## 六、整体原则

  1. 允许少量修辞，但不要形成可识别的套路。
  2. 宁可略微朴素，也不要过度圆滑、过度完整、过度工整。
  3. 宁可写得像真人，有轻微不规则感，也不要写得像"标准答案"。
  4. 以信息量、真实感、具体性为优先，不以腔调取胜。

  ## 输出格式

  请按以下格式输出：

  # 重写后的文本

  [这里是重写后的文本]

  # 修改说明

  [简要说明做了哪些主要修改]

  # 质量评分

  | 维度 | 得分 | 说明 |
  |------|------|------|
  | 直接性 | x/10 | [说明] |
  | 节奏 | x/10 | [说明] |
  | 信任度 | x/10 | [说明] |
  | 真实性 | x/10 | [说明] |
  | 精炼度 | x/10 | [说明] |
  | **总分** | **x/50** | [评级] |

  只返回上述格式的内容，不需要其他解释。

  # 待处理文本

  {{CONTENT}}
